# Release Workflow with Changesets
#
# This workflow uses Changesets to automate versioning and publishing to npm.
# It supports npm Trusted Publishers (OIDC) for secure, token-free publishing.
#
# How it works:
# 1. When you push to master, Changesets creates a "Version Packages" PR
# 2. When that PR is merged, packages are automatically published to npm
# 3. GitHub releases are created automatically
#
# Setup Instructions for npm Trusted Publishers (OIDC):
# 1. Go to https://www.npmjs.com/settings/{your-username}/packages/{package-name}/access
# 2. Enable "Trusted Publishers" under Publishing Access
# 3. Add GitHub Actions as a trusted publisher:
#    - Provider: GitHub Actions
#    - Repository: your-org/your-repo
#    - Workflow: release.yml
#    - Environment: (leave empty)
#
# With trusted publishers, no NPM_TOKEN secret is needed!
# For token-based auth fallback, set NPM_TOKEN in repository secrets.

name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Create releases and tags
      pull-requests: write # Create version PRs
      id-token: write # Required for trusted publishers (OIDC)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Enable auto-merge on version PR
        if: steps.changesets.outputs.hasChangesets == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:changeset-release/master`
            });
            if (pulls.length === 0) { console.log('No version PR found'); return; }
            const pr = pulls[0];
            try {
              await github.graphql(`
                mutation($id: ID!) {
                  enablePullRequestAutoMerge(input: { pullRequestId: $id, mergeMethod: SQUASH }) {
                    pullRequest { number }
                  }
                }
              `, { id: pr.node_id });
              console.log(`Auto-merge enabled on PR #${pr.number}`);
            } catch(e) {
              console.log('Auto-merge not available:', e.message);
            }
